upstream server_manager_app {
    # Don't mark the Node app dead when webpack-hmr WS closes oddly
    server app:3000 max_fails=0;
    keepalive 16;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name server-manager.apps.test;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name server-manager.apps.test;

    ssl_certificate     /etc/nginx/certs/server-manager.apps.test.pem;
    ssl_certificate_key /etc/nginx/certs/server-manager.apps.test-key.pem;

    client_max_body_size 20m;

    location / {
        proxy_pass http://server_manager_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
    }

    location /_next/webpack-hmr {
        proxy_pass http://server_manager_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
    }

    location /ws/terminal {
        proxy_pass http://server_manager_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
    }
}
